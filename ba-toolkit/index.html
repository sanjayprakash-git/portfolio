<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BA Analysis Toolkit — Sanjay Prakash Ravi</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0b;
            --surface: #141416;
            --surface-2: #1c1c1f;
            --border: #2a2a2d;
            --text: #e4e4e7;
            --text-dim: #a1a1aa;
            --accent: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.1);
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --purple: #8b5cf6;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }
        
        /* Header */
        header { text-align: center; margin-bottom: 3rem; }
        header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
        header h1 span { color: var(--accent); }
        header p { color: var(--text-dim); font-size: 0.9rem; }
        .badge { display: inline-block; background: var(--accent-soft); color: var(--accent); padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.75rem; font-weight: 500; margin-top: 0.75rem; }

        /* Input Section */
        .input-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .input-section label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.5rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
        textarea {
            width: 100%; min-height: 120px; background: var(--surface-2); border: 1px solid var(--border);
            border-radius: 8px; padding: 1rem; color: var(--text); font-size: 0.9rem; font-family: inherit;
            resize: vertical; transition: border-color 0.2s;
        }
        textarea:focus { outline: none; border-color: var(--accent); }
        textarea::placeholder { color: #52525b; }

        /* Analysis Buttons */
        .analysis-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 0.75rem; margin-top: 1.25rem;
        }
        .analysis-btn {
            background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px;
            padding: 0.85rem; cursor: pointer; transition: all 0.2s; text-align: left;
        }
        .analysis-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
        .analysis-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .analysis-btn .icon { font-size: 1.2rem; margin-bottom: 0.25rem; }
        .analysis-btn .label { font-size: 0.8rem; font-weight: 600; color: var(--text); }
        .analysis-btn .desc { font-size: 0.7rem; color: var(--text-dim); }
        .run-all {
            grid-column: 1 / -1; background: var(--accent); border-color: var(--accent);
            text-align: center; padding: 1rem; font-weight: 600; color: white;
        }
        .run-all:hover { opacity: 0.9; background: var(--accent); }
        .run-all:disabled { opacity: 0.5; }

        /* Results */
        .results { margin-top: 2rem; }
        .result-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            margin-bottom: 1rem; overflow: hidden;
        }
        .result-card .card-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.85rem;
        }
        .result-card .card-body { padding: 1.25rem; font-size: 0.87rem; line-height: 1.8; white-space: pre-wrap; }
        .result-card .card-body h3 { color: var(--accent); margin: 1rem 0 0.5rem; font-size: 0.9rem; }
        .result-card .card-body ul { margin-left: 1.25rem; }
        .result-card .card-body li { margin-bottom: 0.25rem; }
        .result-card .card-body strong { color: var(--text); }

        .loading { display: flex; align-items: center; gap: 0.5rem; padding: 1.25rem; color: var(--text-dim); font-size: 0.85rem; }
        .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer */
        footer { text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
        footer p { color: var(--text-dim); font-size: 0.8rem; }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .container { padding: 1.25rem 1rem; }
            .analysis-grid { grid-template-columns: 1fr 1fr; }
            header h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>BA <span>Analysis Toolkit</span></h1>
            <p>AI-powered Business Analysis frameworks — from problem statement to structured output</p>
            <div class="badge">Built by Sanjay Prakash Ravi</div>
        </header>

        <div class="input-section">
            <label>Describe the business problem or idea</label>
            <textarea id="problem-input" placeholder="Example: A startup wants to enter the electric vehicle charging market in Ireland, targeting apartment complexes and shared parking facilities..."></textarea>
            
            <div class="analysis-grid">
                <button class="analysis-btn" onclick="runAnalysis('market_sizing')">
                    <div class="icon">📊</div>
                    <div class="label">Market Sizing</div>
                    <div class="desc">TAM / SAM / SOM</div>
                </button>
                <button class="analysis-btn" onclick="runAnalysis('competitor')">
                    <div class="icon">🎯</div>
                    <div class="label">Competitor Analysis</div>
                    <div class="desc">Landscape & positioning</div>
                </button>
                <button class="analysis-btn" onclick="runAnalysis('swot')">
                    <div class="icon">⚖️</div>
                    <div class="label">SWOT</div>
                    <div class="desc">Strengths, Weaknesses, Opportunities, Threats</div>
                </button>
                <button class="analysis-btn" onclick="runAnalysis('stakeholder')">
                    <div class="icon">👥</div>
                    <div class="label">Stakeholder Map</div>
                    <div class="desc">Power / Interest grid</div>
                </button>
                <button class="analysis-btn" onclick="runAnalysis('requirements')">
                    <div class="icon">📋</div>
                    <div class="label">Requirements</div>
                    <div class="desc">Functional & non-functional</div>
                </button>
                <button class="analysis-btn run-all" onclick="runAll()">
                    🚀 Run Full Analysis
                </button>
            </div>
        </div>

        <div class="results" id="results"></div>

        <footer>
            <p>
                <a href="https://sanjayprakash-git.github.io/portfolio" target="_blank">Portfolio</a> · 
                <a href="https://www.linkedin.com/in/sanjay-prakash-a92291186/" target="_blank">LinkedIn</a> · 
                Powered by structured BA methodology & LLM
            </p>
        </footer>
    </div>

<script>
const API_URL = 'https://portfolio-proxy-two.vercel.app/api/ba';

const PROMPTS = {
    market_sizing: `You are a senior Business Analyst. Given the business problem below, produce a Market Sizing analysis with:

1. **TAM (Total Addressable Market)** — top-down estimate with data sources cited
2. **SAM (Serviceable Available Market)** — filtered by geography, segment, constraints
3. **SOM (Serviceable Obtainable Market)** — realistic Year 1-3 capture with assumptions
4. **Key Assumptions** — list each assumption clearly
5. **Data Sources** — where a real analyst would verify these numbers

Use a structured framework. Be specific with numbers even if estimated. Format with markdown headers and bullet points.`,

    competitor: `You are a senior Business Analyst. Given the business problem below, produce a Competitor Analysis with:

1. **Direct Competitors** — 3-5 companies, their positioning, strengths, weaknesses
2. **Indirect Competitors** — alternative solutions customers use today
3. **Competitive Matrix** — compare on: Price, Features, Market Share, Target Segment, UX
4. **Gaps & Opportunities** — where the market is underserved
5. **Recommended Positioning** — how to differentiate

Format with markdown. Use tables where appropriate.`,

    swot: `You are a senior Business Analyst. Given the business problem below, produce a SWOT Analysis with:

**Strengths** (internal, positive) — 4-5 points
**Weaknesses** (internal, negative) — 4-5 points  
**Opportunities** (external, positive) — 4-5 points
**Threats** (external, negative) — 4-5 points

Then add:
- **SO Strategies** (use strengths to capture opportunities)
- **WT Strategies** (mitigate weaknesses against threats)

Be specific to the business context. Format with markdown.`,

    stakeholder: `You are a senior Business Analyst. Given the business problem below, produce a Stakeholder Analysis with:

1. **Stakeholder Identification** — list all relevant stakeholders (internal & external)
2. **Power/Interest Grid** — classify each as:
   - High Power / High Interest → Manage Closely
   - High Power / Low Interest → Keep Satisfied
   - Low Power / High Interest → Keep Informed
   - Low Power / Low Interest → Monitor
3. **Communication Plan** — frequency and channel per group
4. **Key Risks** — stakeholder-related risks and mitigations

Format with markdown.`,

    requirements: `You are a senior Business Analyst. Given the business problem below, produce a Requirements Outline with:

1. **Business Requirements** — 3-5 high-level goals
2. **Functional Requirements** — 8-10 specific features (use MoSCoW: Must/Should/Could/Won't)
3. **Non-Functional Requirements** — performance, security, scalability, compliance
4. **User Stories** — 3-4 key user stories in format: "As a [role], I want [goal], so that [benefit]"
5. **Acceptance Criteria** — for the top 2 user stories
6. **Assumptions & Constraints**

Format with markdown.`
};

const LABELS = {
    market_sizing: { icon: '📊', title: 'Market Sizing (TAM/SAM/SOM)' },
    competitor: { icon: '🎯', title: 'Competitor Analysis' },
    swot: { icon: '⚖️', title: 'SWOT Analysis' },
    stakeholder: { icon: '👥', title: 'Stakeholder Map' },
    requirements: { icon: '📋', title: 'Requirements Outline' }
};

async function runAnalysis(type) {
    const input = document.getElementById('problem-input').value.trim();
    if (!input) { alert('Please describe a business problem first.'); return; }

    const results = document.getElementById('results');
    const cardId = `result-${type}`;
    
    // Remove existing card if re-running
    const existing = document.getElementById(cardId);
    if (existing) existing.remove();

    // Add loading card
    const card = document.createElement('div');
    card.className = 'result-card';
    card.id = cardId;
    card.innerHTML = `
        <div class="card-header">${LABELS[type].icon} ${LABELS[type].title}</div>
        <div class="loading"><div class="spinner"></div>Analyzing...</div>
    `;
    results.prepend(card);

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                analysis_type: type,
                messages: [
                    { role: 'system', content: PROMPTS[type] },
                    { role: 'user', content: input }
                ]
            })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error?.message || 'API error');

        const content = data.choices[0].message.content;
        card.innerHTML = `
            <div class="card-header">${LABELS[type].icon} ${LABELS[type].title}</div>
            <div class="card-body">${formatMarkdown(content)}</div>
        `;
    } catch (e) {
        card.innerHTML = `
            <div class="card-header">${LABELS[type].icon} ${LABELS[type].title}</div>
            <div class="card-body" style="color: var(--red);">Error: ${e.message}</div>
        `;
    }
}

async function runAll() {
    const input = document.getElementById('problem-input').value.trim();
    if (!input) { alert('Please describe a business problem first.'); return; }
    
    document.getElementById('results').innerHTML = '';
    const types = ['market_sizing', 'competitor', 'swot', 'stakeholder', 'requirements'];
    for (const type of types) {
        await runAnalysis(type);
    }
}

function formatMarkdown(text) {
    return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^# (.+)$/gm, '<h3>$1</h3>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/^\- (.+)$/gm, '<li>$1</li>')
        .replace(/^\* (.+)$/gm, '<li>$1</li>')
        .replace(/\n{2,}/g, '<br><br>')
        .replace(/\n/g, '<br>');
}
</script>
</body>
</html>
